<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>案C-2: 3列・ジャンル色分け | トップページデザイン案</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .proto-badge { position: fixed; top: 0; right: 0; background: #b3261e; color: #fff; font-size: 11px; padding: 2px 10px; border-bottom-left-radius: 8px; z-index: 10; }
    .sticky-top { position: sticky; top: 0; background: var(--color-bg); padding: 8px 0 0; z-index: 5; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 2px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 0 0 auto; padding: 7px 15px; border-radius: 999px; border: 1.5px solid var(--color-border); background: var(--color-bg); color: var(--color-text); font-size: 0.9rem; cursor: pointer; white-space: nowrap; }
    .tab.active { font-weight: 700; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 10px; margin: 12px 0 22px; }
    .tile { display: flex; flex-direction: column; align-items: center; gap: 7px; text-decoration: none; color: var(--color-text); }
    .tile .ic {
      width: 100%; aspect-ratio: 1; max-width: 88px; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; border-radius: 20px; position: relative; border: 1px solid transparent;
    }
    .tile .nm { font-size: 0.8rem; font-weight: 600; text-align: center; line-height: 1.3; white-space: nowrap; }
    .tile .bdg { position: absolute; top: -7px; right: -5px; background: #b3261e; color: #fff; font-size: 0.66rem; font-weight: 700; border-radius: 999px; padding: 1px 6px; }
    .sec-h { font-size: 0.82rem; color: var(--color-muted); margin: 14px 0 0; font-weight: 700; }
    /* ジャンル色(淡色チップ) */
    .c-健康 { background: #e3f4ec; }
    .c-お金 { background: #fcefdd; }
    .c-日付 { background: #e6edfa; }
    .c-変換 { background: #f0e9f8; }
    @media (prefers-color-scheme: dark) {
      .c-健康 { background: #1c342a; }
      .c-お金 { background: #38291a; }
      .c-日付 { background: #202b40; }
      .c-変換 { background: #2d2438; }
    }
  </style>
</head>
<body>
<div class="proto-badge">案C-2</div>
<header class="site-header">
  <a class="site-brand" href="#">🧮 計算ツールボックス</a>
</header>
<main>
  <div class="sticky-top">
    <div class="tool-search" style="margin:4px 0 0;">
      <input type="search" id="q" placeholder="ツールを検索" aria-label="検索">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="pop-sec">
    <p class="sec-h">🔥 人気</p>
    <div class="grid" id="popular"></div>
  </div>

  <p class="sec-h" id="genre-title">すべて(61)</p>
  <div class="grid" id="grid"></div>
</main>
<script src="./data.js"></script>
<script>
(function () {
  "use strict";
  var CATS = [["all", "すべて", "var(--color-accent)"], ["健康", "健康", "#12915f"], ["お金", "お金", "#c2661f"], ["日付", "日付・時間", "#5b7fbf"], ["変換", "暮らし・変換", "#8a63b8"]];
  var current = "all";
  var tabsEl = document.getElementById("tabs");
  CATS.forEach(function (c) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "tab" + (c[0] === current ? " active" : "");
    b.textContent = c[1];
    b.dataset.color = c[2];
    if (c[0] === current) { b.style.background = c[2]; b.style.borderColor = c[2]; }
    b.onclick = function () {
      current = c[0];
      tabsEl.querySelectorAll(".tab").forEach(function (t, i) {
        var on = CATS[i][0] === current;
        t.classList.toggle("active", on);
        t.style.background = on ? CATS[i][2] : "";
        t.style.borderColor = on ? CATS[i][2] : "";
      });
      render();
    };
    tabsEl.appendChild(b);
  });
  function tile(t, badge) {
    return '<a class="tile" href="#"><span class="ic c-' + t.cat + '">' + t.emoji + (badge ? '<span class="bdg">' + badge + "位</span>" : "") + '</span><span class="nm">' + t.g + "</span></a>";
  }
  document.getElementById("popular").innerHTML =
    TOOLS.filter(function (t) { return t.rank && t.rank <= 6; }).sort(function (a, b) { return a.rank - b.rank; })
      .map(function (t, i) { return tile(t, i + 1); }).join("");
  function render() {
    var q = document.getElementById("q").value.trim().toLowerCase();
    var items = TOOLS.filter(function (t) {
      if (q) return (t.name + t.desc + t.kw).toLowerCase().indexOf(q) !== -1;
      return current === "all" || t.cat === current;
    });
    document.getElementById("pop-sec").style.display = (q || current !== "all") ? "none" : "";
    document.getElementById("genre-title").textContent = q ? "検索結果(" + items.length + ")" :
      (current === "all" ? "すべて(61)" : CATS.find(function (c) { return c[0] === current; })[1] + "(" + items.length + ")");
    document.getElementById("grid").innerHTML = items.map(function (t) { return tile(t); }).join("");
  }
  document.getElementById("q").addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
