<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>案J: ミニマル・クリーン | トップページデザイン案</title>
  <style>
    :root {
      --bg: #ffffff; --tile: #f4f5f4; --ink: #1f2422; --muted: #98a09b; --accent: #0e7d59;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #131513; --tile: #1e221f; --ink: #eef1ef; --muted: #838b85; }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--ink); font-size: 16px; }
    .proto-badge { position: fixed; top: 0; right: 0; background: #b3261e; color: #fff; font-size: 11px; padding: 2px 10px; border-bottom-left-radius: 8px; z-index: 10; }
    main { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
    h1 { font-size: 1.15rem; margin: 26px 0 0; font-weight: 800; letter-spacing: 0.01em; display: flex; align-items: center; gap: 8px; }
    h1::before { content: ""; width: 10px; height: 10px; border-radius: 3px; background: var(--accent); }
    .tg { color: var(--muted); font-size: 0.78rem; margin: 4px 0 16px; }
    .search { display: flex; align-items: center; gap: 9px; background: var(--tile); border-radius: 14px; padding: 13px 16px; color: var(--muted); }
    .search input { border: none; outline: none; background: none; font-size: 1rem; width: 100%; color: var(--ink); }
    .tabs { display: flex; gap: 4px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; border-bottom: 1px solid var(--tile); }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto; padding: 8px 13px 10px; border: none; background: none; color: var(--muted);
      font-size: 0.9rem; cursor: pointer; white-space: nowrap; font-weight: 600; position: relative;
    }
    .tab.on { color: var(--ink); }
    .tab.on::after { content: ""; position: absolute; left: 13px; right: 13px; bottom: 0; height: 2.5px; border-radius: 2px; background: var(--accent); }
    .sec { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; margin: 22px 2px 12px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 10px; }
    .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; color: var(--ink); }
    .tile .ic {
      width: 100%; aspect-ratio: 1; max-width: 74px; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; background: var(--tile); border-radius: 50%; position: relative;
    }
    .tile .nm { font-size: 0.73rem; font-weight: 600; text-align: center; white-space: nowrap; }
    .tile .rk {
      position: absolute; top: -3px; right: -3px; width: 21px; height: 21px; border-radius: 50%;
      background: var(--accent); color: #fff; font-size: 0.68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg);
    }
  </style>
</head>
<body>
<div class="proto-badge">案J</div>
<main>
  <h1>計算ツールボックス</h1>
  <p class="tg">暮らしの計算61ツール・登録不要・ぜんぶ無料</p>
  <div class="search">🔍 <input type="search" id="q" placeholder="検索(例: 家賃、文字数、営業日)"></div>
  <div class="tabs" id="tabs"></div>

  <div id="pop-sec">
    <p class="sec">人気 — 毎週更新</p>
    <div class="grid" id="popular"></div>
  </div>

  <p class="sec" id="genre-title">すべて — 61個</p>
  <div class="grid" id="grid"></div>
</main>
<script src="./data.js"></script>
<script>
(function () {
  "use strict";
  var CATS = [["all", "すべて"], ["健康", "健康"], ["お金", "お金"], ["日付", "日付・時間"], ["変換", "暮らし・変換"]];
  var current = "all";
  var tabsEl = document.getElementById("tabs");
  CATS.forEach(function (c) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "tab" + (c[0] === current ? " on" : "");
    b.textContent = c[1];
    b.onclick = function () {
      current = c[0];
      tabsEl.querySelectorAll(".tab").forEach(function (t, i) { t.classList.toggle("on", CATS[i][0] === current); });
      render();
    };
    tabsEl.appendChild(b);
  });
  function tile(t, rk) {
    return '<a class="tile" href="#"><span class="ic">' + t.emoji + (rk ? '<span class="rk">' + rk + "</span>" : "") + '</span><span class="nm">' + t.g + "</span></a>";
  }
  document.getElementById("popular").innerHTML =
    TOOLS.filter(function (t) { return t.rank && t.rank <= 8; }).sort(function (a, b) { return a.rank - b.rank; })
      .map(function (t, i) { return tile(t, i + 1); }).join("");
  function render() {
    var q = document.getElementById("q").value.trim().toLowerCase();
    var items = TOOLS.filter(function (t) {
      if (q) return (t.name + t.desc + t.kw).toLowerCase().indexOf(q) !== -1;
      return current === "all" || t.cat === current;
    });
    document.getElementById("pop-sec").style.display = (q || current !== "all") ? "none" : "";
    var label = q ? "検索結果" : (current === "all" ? "すべて" : CATS.find(function (c) { return c[0] === current; })[1]);
    document.getElementById("genre-title").textContent = label + " — " + items.length + "個";
    document.getElementById("grid").innerHTML = items.map(function (t) { return tile(t); }).join("");
  }
  document.getElementById("q").addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
