<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>案C-1: ミニマル4列 | トップページデザイン案</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .proto-badge { position: fixed; top: 0; right: 0; background: #b3261e; color: #fff; font-size: 11px; padding: 2px 10px; border-bottom-left-radius: 8px; z-index: 10; }
    .sticky-top { position: sticky; top: 0; background: var(--color-bg); padding: 8px 0 0; z-index: 5; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 2px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 0 0 auto; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text); font-size: 0.9rem; cursor: pointer; white-space: nowrap; }
    .tab.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 8px; margin: 12px 0 22px; }
    .tile { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; color: var(--color-text); }
    .tile .ic {
      width: 100%; aspect-ratio: 1; max-width: 72px; display: flex; align-items: center; justify-content: center;
      font-size: 1.85rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 17px;
      position: relative;
    }
    .tile .nm { font-size: 0.72rem; text-align: center; line-height: 1.25; white-space: nowrap; }
    .tile .bdg { position: absolute; top: -6px; right: -4px; background: var(--color-accent); color: #fff; font-size: 0.62rem; font-weight: 700; border-radius: 999px; padding: 1px 5px; }
    .sec-h { font-size: 0.82rem; color: var(--color-muted); margin: 14px 0 0; font-weight: 700; }
  </style>
</head>
<body>
<div class="proto-badge">案C-1</div>
<header class="site-header">
  <a class="site-brand" href="#">🧮 計算ツールボックス</a>
</header>
<main>
  <div class="sticky-top">
    <div class="tool-search" style="margin:4px 0 0;">
      <input type="search" id="q" placeholder="ツールを検索" aria-label="検索">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="pop-sec">
    <p class="sec-h">🔥 人気</p>
    <div class="grid" id="popular"></div>
  </div>

  <p class="sec-h" id="genre-title">すべて(61)</p>
  <div class="grid" id="grid"></div>
</main>
<script src="./data.js"></script>
<script>
(function () {
  "use strict";
  var CATS = [["all", "すべて"], ["健康", "健康"], ["お金", "お金"], ["日付", "日付・時間"], ["変換", "暮らし・変換"]];
  var current = "all";
  var tabsEl = document.getElementById("tabs");
  CATS.forEach(function (c) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "tab" + (c[0] === current ? " active" : "");
    b.textContent = c[1];
    b.onclick = function () {
      current = c[0];
      tabsEl.querySelectorAll(".tab").forEach(function (t, i) { t.classList.toggle("active", CATS[i][0] === current); });
      render();
    };
    tabsEl.appendChild(b);
  });
  function tile(t, badge) {
    return '<a class="tile" href="#"><span class="ic">' + t.emoji + (badge ? '<span class="bdg">' + badge + "</span>" : "") + '</span><span class="nm">' + t.g + "</span></a>";
  }
  document.getElementById("popular").innerHTML =
    TOOLS.filter(function (t) { return t.rank && t.rank <= 8; }).sort(function (a, b) { return a.rank - b.rank; })
      .map(function (t, i) { return tile(t, i + 1); }).join("");
  function render() {
    var q = document.getElementById("q").value.trim().toLowerCase();
    var items = TOOLS.filter(function (t) {
      if (q) return (t.name + t.desc + t.kw).toLowerCase().indexOf(q) !== -1;
      return current === "all" || t.cat === current;
    });
    document.getElementById("pop-sec").style.display = (q || current !== "all") ? "none" : "";
    document.getElementById("genre-title").textContent = q ? "検索結果(" + items.length + ")" :
      (current === "all" ? "すべて(61)" : CATS.find(function (c) { return c[0] === current; })[1] + "(" + items.length + ")");
    document.getElementById("grid").innerHTML = items.map(function (t) { return tile(t); }).join("");
  }
  document.getElementById("q").addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
