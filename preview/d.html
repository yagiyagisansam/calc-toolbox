<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>案D: 検索ファースト型 | トップページデザイン案</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    .proto-badge { position: fixed; top: 0; right: 0; background: #b3261e; color: #fff; font-size: 11px; padding: 2px 10px; border-bottom-left-radius: 8px; z-index: 10; }
    .hero { text-align: center; padding: 26px 0 6px; }
    .hero h1 { font-size: 1.25rem; margin: 0 0 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 8px 13px; border-radius: 999px;
      border: 1px solid var(--color-border); background: var(--color-surface); text-decoration: none;
      color: var(--color-text); font-size: 0.85rem;
    }
    .chip.hot { border-color: var(--color-accent); background: var(--color-accent-weak); }
    .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
    .genre-btn {
      display: flex; flex-direction: column; gap: 2px; padding: 14px 16px; border: 1.5px solid var(--color-border);
      border-radius: 14px; text-decoration: none; color: var(--color-text); background: var(--color-bg); cursor: pointer; text-align: left;
    }
    .genre-btn .t { font-weight: 700; font-size: 1rem; }
    .genre-btn .c { font-size: 0.75rem; color: var(--color-muted); }
    .genre-btn.active { border-color: var(--color-accent); background: var(--color-accent-weak); }
    .sec-h { font-size: 0.85rem; color: var(--color-muted); letter-spacing: 0.06em; margin: 18px 0 6px; font-weight: 700; }
    .tool-card > a { display: flex; align-items: center; }
    .tool-card .e { font-size: 1.2rem; margin-right: 8px; }
  </style>
</head>
<body>
<div class="proto-badge">デザイン案D(モックアップ)</div>
<header class="site-header">
  <a class="site-brand" href="#">🧮 計算ツールボックス</a>
</header>
<main>
  <div class="hero">
    <h1>なにを計算しますか?</h1>
    <div class="tool-search">
      <input type="search" id="q" placeholder="例: 家賃の日割り、文字数、営業日" aria-label="検索">
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="genre-grid" id="genres"></div>

  <p class="sec-h" id="list-title" hidden></p>
  <ul class="tool-list" id="list"></ul>
</main>
<script src="./data.js"></script>
<script>
(function () {
  "use strict";
  // チップ = 人気+この端末でよく使う、の自動ミックス(利用に応じて入れ替わる)
  var HOT = ["moji", "password", "waribiki", "days", "eigyobi", "fudosan", "bmi", "wareki", "jikan", "kinenbi"];
  var chipsEl = document.getElementById("chips");
  HOT.forEach(function (s, i) {
    var t = TOOLS.find(function (x) { return x.slug === s; });
    chipsEl.innerHTML += '<a class="chip' + (i < 3 ? " hot" : "") + '" href="#">' + t.emoji + " " + t.short + "</a>";
  });
  var CATS = [["健康", "💪 健康", "BMI・カロリー・睡眠など"], ["お金", "💴 お金", "ローン・割引・不動産など"], ["日付", "📅 日付・時間", "営業日・○ヶ月後など"], ["変換", "🔄 暮らし・変換", "文字数・単位・お米など"]];
  var gEl = document.getElementById("genres");
  var current = null;
  CATS.forEach(function (c) {
    var n = TOOLS.filter(function (t) { return t.cat === c[0]; }).length;
    var b = document.createElement("button");
    b.type = "button";
    b.className = "genre-btn";
    b.innerHTML = '<span class="t">' + c[1] + '</span><span class="c">' + n + "個 — " + c[2] + "</span>";
    b.onclick = function () {
      current = current === c[0] ? null : c[0];
      gEl.querySelectorAll(".genre-btn").forEach(function (x, i) { x.classList.toggle("active", CATS[i][0] === current); });
      render();
    };
    gEl.appendChild(b);
  });
  function render() {
    var q = document.getElementById("q").value.trim().toLowerCase();
    var title = document.getElementById("list-title");
    var list = document.getElementById("list");
    var items = [];
    if (q) {
      items = TOOLS.filter(function (t) { return (t.name + t.desc + t.kw).toLowerCase().indexOf(q) !== -1; });
      title.textContent = "🔍 検索結果 " + items.length + "件";
    } else if (current) {
      items = TOOLS.filter(function (t) { return t.cat === current; });
      title.textContent = "📂 " + current + " " + items.length + "個";
    } else {
      title.hidden = true;
      list.innerHTML = "";
      return;
    }
    title.hidden = false;
    list.innerHTML = items.map(function (t) {
      return '<li class="tool-card"><a href="#"><span class="e">' + t.emoji + '</span><span><span class="tool-name">' + t.name + '</span><p>' + t.desc + "</p></span></a></li>";
    }).join("");
  }
  document.getElementById("q").addEventListener("input", render);
})();
</script>
</body>
</html>
