<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>案F: 文具・紙とインク風 | トップページデザイン案</title>
  <style>
    :root {
      --paper: #f6f2e9; --card: #fdfbf6; --ink: #37302a; --muted: #8c8273;
      --green: #2e6e4e; --shu: #c73e3a; --line: #d9d0bd;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--paper); color: var(--ink); font-size: 16px; line-height: 1.7; }
    .proto-badge { position: fixed; top: 0; right: 0; background: #b3261e; color: #fff; font-size: 11px; padding: 2px 10px; border-bottom-left-radius: 8px; z-index: 10; }
    main { max-width: 720px; margin: 0 auto; padding: 0 18px 60px; }
    .brand { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 0; }
    .brand h1 { font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; font-size: 1.7rem; margin: 0; font-weight: 600; letter-spacing: 0.04em; }
    .hanko {
      width: 34px; height: 34px; border: 2px solid var(--shu); color: var(--shu); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-family: "Hiragino Mincho ProN", serif;
      font-weight: 700; font-size: 1.05rem; transform: rotate(-3deg); flex: 0 0 auto;
    }
    .tagline { color: var(--muted); font-size: 0.82rem; margin: 2px 0 18px; letter-spacing: 0.05em; }
    .search { border-bottom: 2px solid var(--ink); display: flex; gap: 8px; align-items: center; padding: 6px 2px; }
    .search input { border: none; outline: none; background: none; width: 100%; font-size: 1.05rem; color: var(--ink); }
    .search input::placeholder { color: var(--muted); }
    .tabs { display: flex; gap: 2px; margin: 22px 0 0; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto; border: 1px solid var(--line); border-bottom: none; background: #efe9db; color: var(--muted);
      border-radius: 8px 8px 0 0; padding: 7px 16px 5px; font-size: 0.86rem; cursor: pointer;
    }
    .tab.on { background: var(--card); color: var(--ink); font-weight: 700; border-color: var(--ink); position: relative; }
    .sheet { background: var(--card); border: 1px solid var(--ink); border-radius: 0 10px 10px 10px; padding: 16px 14px; }
    .sec { font-family: "Hiragino Mincho ProN", serif; font-size: 0.95rem; font-weight: 600; margin: 4px 2px 10px; display: flex; align-items: center; gap: 8px; }
    .sec .maru { width: 20px; height: 20px; border-radius: 50%; background: var(--shu); color: #fff; font-size: 0.7rem; display: inline-flex; align-items: center; justify-content: center; font-family: sans-serif; }
    .pop { list-style: none; padding: 0; margin: 0 0 18px; }
    .pop li { border-bottom: 1px dashed var(--line); }
    .pop a { display: flex; align-items: center; gap: 10px; padding: 9px 2px; text-decoration: none; color: var(--ink); }
    .pop .no { font-family: "Hiragino Mincho ProN", serif; font-size: 1.05rem; color: var(--shu); width: 26px; text-align: center; font-weight: 700; flex: 0 0 auto; }
    .pop .nm { font-weight: 700; font-size: 0.95rem; }
    .pop .ds { color: var(--muted); font-size: 0.76rem; margin-left: auto; text-align: right; max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card {
      border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; text-decoration: none; color: var(--ink);
      background: var(--card); min-height: 64px;
    }
    .card .nm { font-weight: 700; font-size: 0.9rem; display: block; }
    .card .ds { color: var(--muted); font-size: 0.72rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 2px; }
  </style>
</head>
<body>
<div class="proto-badge">案F</div>
<main>
  <div class="brand"><span class="hanko">計</span><h1>計算ツールボックス</h1></div>
  <p class="tagline">— 暮らしの計算を、ぜんぶこの一冊で。61の道具箱 —</p>
  <div class="search">🔍 <input type="search" id="q" placeholder="なにを計算しますか(例: 家賃、文字数)"></div>

  <div class="tabs" id="tabs"></div>
  <div class="sheet">
    <div id="pop-sec">
      <p class="sec"><span class="maru">人</span>よく使われている道具</p>
      <ul class="pop" id="popular"></ul>
    </div>
    <p class="sec" id="genre-title"></p>
    <div class="cards" id="cards"></div>
  </div>
</main>
<script src="./data.js"></script>
<script>
(function () {
  "use strict";
  var CATS = [["all", "すべて"], ["健康", "健康"], ["お金", "お金"], ["日付", "日付・時間"], ["変換", "暮らし・変換"]];
  var current = "all";
  var tabsEl = document.getElementById("tabs");
  CATS.forEach(function (c) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "tab" + (c[0] === current ? " on" : "");
    b.textContent = c[1];
    b.onclick = function () {
      current = c[0];
      tabsEl.querySelectorAll(".tab").forEach(function (x, i) { x.classList.toggle("on", CATS[i][0] === current); });
      render();
    };
    tabsEl.appendChild(b);
  });
  var NOS = ["一", "二", "三", "四", "五"];
  document.getElementById("popular").innerHTML =
    TOOLS.filter(function (t) { return t.rank && t.rank <= 5; }).sort(function (a, b) { return a.rank - b.rank; })
      .map(function (t, i) {
        return '<li><a href="#"><span class="no">' + NOS[i] + '</span><span class="nm">' + t.name + '</span><span class="ds">' + t.desc.split("。")[0] + "</span></a></li>";
      }).join("");
  function render() {
    var q = document.getElementById("q").value.trim().toLowerCase();
    var items = TOOLS.filter(function (t) {
      if (q) return (t.name + t.desc + t.kw).toLowerCase().indexOf(q) !== -1;
      return current === "all" || t.cat === current;
    });
    document.getElementById("pop-sec").style.display = (q || current !== "all") ? "none" : "";
    document.getElementById("genre-title").innerHTML = q ? "検索結果 " + items.length + "件" :
      (current === "all" ? "すべての道具(61)" : CATS.find(function (c) { return c[0] === current; })[1] + "(" + items.length + ")");
    document.getElementById("cards").innerHTML = items.map(function (t) {
      return '<a class="card" href="#"><span class="nm">' + t.g + '</span><span class="ds">' + t.desc + "</span></a>";
    }).join("");
  }
  document.getElementById("q").addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
